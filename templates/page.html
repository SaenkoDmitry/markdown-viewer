<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-light" disabled>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-dark">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
<!-- Бургер для мобильных -->
<button class="burger" id="burger" aria-label="Открыть меню">
    <span></span>
    <span></span>
    <span></span>
</button>

<!-- Оверлей для закрытия по клику вне меню -->
<div class="overlay" id="overlay"></div>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3>{{.Title}}</h3>
        <button id="theme-toggle" class="theme-btn" title="Переключить тему">🌙</button>
    </div>
    {{range .Sidebar}}
    <a href="{{.Path}}" class="nav-link">
        {{.Title}}
    </a>
    {{end}}
</nav>

<main class="content">
    <article class="markdown-body">
        {{.Content}}
    </article>
</main>

<script>
    (function() {
        // Тема
        const btn = document.getElementById('theme-toggle');
        const html = document.documentElement;
        const hljsLight = document.getElementById('hljs-light');
        const hljsDark = document.getElementById('hljs-dark');

        const saved = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        let isDark = saved ? saved === 'dark' : prefersDark;

        function apply() {
            html.setAttribute('data-theme', isDark ? 'dark' : 'light');
            hljsDark.disabled = !isDark;
            hljsLight.disabled = isDark;
            btn.textContent = isDark ? '☀️' : '🌙';
        }

        apply();

        btn.addEventListener('click', () => {
            isDark = !isDark;
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            apply();
        });

        hljs.highlightAll();

        // Бургер меню
        const burger = document.getElementById('burger');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        function toggleMenu() {
            burger.classList.toggle('active');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
            document.body.classList.toggle('menu-open');
        }

        burger.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

        // Закрываем меню при клике на ссылку
        sidebar.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth <= 768) {
                    toggleMenu();
                }
            });
        });
    })();
</script>
</body>
</html>
