<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-light" disabled>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-dark">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
<nav class="sidebar">
    <div class="sidebar-header">
        <h3>📚 База знаний</h3>
        <button id="theme-toggle" class="theme-btn" title="Переключить тему">🌙</button>
    </div>
    {{range .Sidebar}}
    <a href="{{.Path}}" class="nav-link">
        {{.Title}}
    </a>
    {{end}}
</nav>

<main class="content">
    <article class="markdown-body">
        {{.Content}}
    </article>
</main>

<script>
    (function() {
        const btn = document.getElementById('theme-toggle');
        const html = document.documentElement;
        const hljsLight = document.getElementById('hljs-light');
        const hljsDark = document.getElementById('hljs-dark');

        const saved = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        let isDark = saved ? saved === 'dark' : prefersDark;

        function apply() {
            html.setAttribute('data-theme', isDark ? 'dark' : 'light');
            hljsDark.disabled = !isDark;
            hljsLight.disabled = isDark;
            btn.textContent = isDark ? '☀️' : '🌙';
        }

        apply();

        btn.addEventListener('click', () => {
            isDark = !isDark;
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            apply();
        });

        hljs.highlightAll();
    })();
</script>
</body>
</html>
