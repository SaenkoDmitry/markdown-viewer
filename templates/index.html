<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Viewer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="landing">
    <h1>📖 Markdown Viewer</h1>
    <p>Вставьте ссылку на публичный GitHub-репозиторий с .md файлами</p>

    <form class="repo-form" action="/open" method="POST" id="form">
        <input
                type="url"
                name="repo"
                placeholder="https://github.com/username/obsidian-notes"
                required
                autofocus
                id="repo-input"
        >
        <button type="submit" id="submit-btn">Открыть</button>
    </form>

    <div class="sessions" id="sessions" style="display:none">
        <h3>🕐 История</h3>
        <div id="sessions-list"></div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'mdviewer-history';

    function loadHistory() {
        try {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        } catch {
            return [];
        }
    }

    function saveHistory(history) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history.slice(-20)));
    }

    function removeFromHistory(repoURL) {
        const history = loadHistory().filter(h => h.repo !== repoURL);
        saveHistory(history);
        renderHistory();
    }

    function renderHistory() {
        const history = loadHistory();
        const container = document.getElementById('sessions');
        const list = document.getElementById('sessions-list');

        if (history.length === 0) {
            container.style.display = 'none';
            return;
        }

        container.style.display = 'block';
        list.innerHTML = '';

        history.slice().reverse().forEach(h => {
            const div = document.createElement('div');
            div.className = 'session-item';
            div.innerHTML = `
            <a href="/s/${h.id}/" style="display:flex;flex:1;align-items:center;justify-content:space-between;text-decoration:none;color:inherit;">
                <div class="session-info">
                    <span class="session-repo">${extractRepoName(h.repo)}</span>
                    <span class="session-meta">${h.branch} · ${h.pages} стр. · ${formatDate(h.date)}</span>
                </div>
                <span>→</span>
            </a>
            <button class="session-remove" onclick="event.preventDefault();removeFromHistory('${h.repo}');" title="Удалить">×</button>
        `;
            list.appendChild(div);
        });
    }

    function extractRepoName(url) {
        const m = url.match(/github\.com\/([^/]+\/[^/]+)/);
        return m ? m[1] : url;
    }

    function formatDate(iso) {
        const d = new Date(iso);
        return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
    }

    document.getElementById('form').addEventListener('submit', function(e) {
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = 'Загрузка...';
    });

    renderHistory();
</script>
</body>
</html>
